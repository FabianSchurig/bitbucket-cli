version: 2

project_name: bb-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: bb-cli
    main: ./cmd/bb-cli
    binary: bb-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

  - id: bb-mcp
    main: ./cmd/bb-mcp
    binary: bb-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: bb-tf
    main: ./cmd/bb-tf
    binary: terraform-provider-bitbucket
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: bb-cli
    builds:
      - bb-cli
    format_overrides:
      - goos: windows
        formats:
          - zip
    formats:
      - tar.gz
    name_template: "bb-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: bb-mcp
    builds:
      - bb-mcp
    format_overrides:
      - goos: windows
        formats:
          - zip
    formats:
      - tar.gz
    name_template: "bb-mcp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: bb-tf
    builds:
      - bb-tf
    format_overrides:
      - goos: windows
        formats:
          - zip
    formats:
      - tar.gz
    name_template: "terraform-provider-bitbucket_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  github:
    owner: FabianSchurig
    name: bitbucket-cli

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

gomod:
  proxy: true
  env:
    - GOPROXY=https://proxy.golang.org,direct
    - GONOSUMCHECK=

nfpms:
  - id: bb-cli
    builds:
      - bb-cli
    package_name: bb-cli
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Arch }}"
    vendor: FabianSchurig
    homepage: "https://github.com/FabianSchurig/bitbucket-cli"
    maintainer: "Fabian Schurig"
    description: "A CLI tool for interacting with Bitbucket."
    license: AGPL-3.0
    formats:
      - deb
      - rpm
  - id: bb-mcp
    builds:
      - bb-mcp
    package_name: bb-mcp
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Arch }}"
    vendor: FabianSchurig
    homepage: "https://github.com/FabianSchurig/bitbucket-cli"
    maintainer: "Fabian Schurig"
    description: "An MCP server for interacting with Bitbucket via AI agents."
    license: AGPL-3.0
    formats:
      - deb
      - rpm

scoops:
  - ids:
      - bb-cli
    name: bb-cli
    repository:
      owner: FabianSchurig
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    description: "A CLI tool for interacting with Bitbucket."
    homepage: "https://github.com/FabianSchurig/bitbucket-cli"
    license: AGPL-3.0
  - ids:
      - bb-mcp
    name: bb-mcp
    repository:
      owner: FabianSchurig
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    description: "An MCP server for interacting with Bitbucket via AI agents."
    homepage: "https://github.com/FabianSchurig/bitbucket-cli"
    license: AGPL-3.0

wingets:
  - ids:
      - bb-cli
    name: bb-cli
    publisher: FabianSchurig
    short_description: "A CLI tool for interacting with Bitbucket."
    license: AGPL-3.0
    homepage: "https://github.com/FabianSchurig/bitbucket-cli"
    repository:
      owner: FabianSchurig
      name: winget-pkgs
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
  - ids:
      - bb-mcp
    name: bb-mcp
    publisher: FabianSchurig
    short_description: "An MCP server for interacting with Bitbucket via AI agents."
    license: AGPL-3.0
    homepage: "https://github.com/FabianSchurig/bitbucket-cli"
    repository:
      owner: FabianSchurig
      name: winget-pkgs
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"

brews:
  - name: bitbucket-cli
    ids:
      - bb-cli
    repository:
      owner: FabianSchurig
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    description: "A CLI tool for interacting with Bitbucket."
    homepage: "https://github.com/FabianSchurig/bitbucket-cli"
    install: |
      bin.install "bb-cli"
  - name: bitbucket-mcp
    ids:
      - bb-mcp
    repository:
      owner: FabianSchurig
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    description: "An MCP server for interacting with Bitbucket via AI agents."
    homepage: "https://github.com/FabianSchurig/bitbucket-cli"
    install: |
      bin.install "bb-mcp"
