name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed for git-auto-commit-action on push
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.11.4

      - name: Format
        run: gofmt -w .

      - name: Commit formatting fixes
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "style: apply gofmt formatting [skip ci]"
          file_pattern: "*.go"

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Normalize coverage report for SonarQube
        run: |
          test -s coverage.out
          awk 'NR == 1 || ($0 !~ /\.gen\.go:/ && $0 !~ /^github.com\/FabianSchurig\/bitbucket-cli\/scripts\//)' coverage.out \
            | sed '2,$ s#^github.com/FabianSchurig/bitbucket-cli/##' \
            > coverage.out.tmp
          mv coverage.out.tmp coverage.out

      - name: SonarQube Scan
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
